# ElevateIQ — Optimized Nginx Production Configuration
# Place this in: /etc/nginx/sites-available/elevateiq
# Symlink: ln -s /etc/nginx/sites-available/elevateiq /etc/nginx/sites-enabled/
# Test: nginx -t
# Reload: systemctl reload nginx

# Note: Ensure the global /etc/nginx/nginx.conf has:
# worker_processes auto;
# worker_rlimit_nofile 16384;
# events {
#     worker_connections 4096;
#     use epoll;
#     multi_accept on;
# }

upstream elevateiq_app {
    server 127.0.0.1:8000;
    keepalive 128; # keeps 128 connections open to Gunicorn to reduce handshake overhead
}

# Rate Limiting Zones (DDoS / Flood Protection)
limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;
limit_req_zone $binary_remote_addr zone=req_limit_per_ip:10m rate=50r/s;

server {
    listen 80;
    server_name elevateiq-softtech.com www.elevateiq-softtech.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name elevateiq-softtech.com www.elevateiq-softtech.com;

    # ── SSL tuning for performance and security ───────────────
    ssl_certificate     /etc/letsencrypt/live/elevateiq-softtech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/elevateiq-softtech.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers         'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Security Headers ─────────────────────────────────────
    add_header X-Frame-Options          SAMEORIGIN;
    add_header X-Content-Type-Options   nosniff;
    add_header X-XSS-Protection         "1; mode=block";
    add_header Referrer-Policy          "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Buffers & Timeouts tuning for high concurrency ───────
    client_body_buffer_size      128k;
    client_header_buffer_size    1k;
    client_max_body_size         10M;
    large_client_header_buffers  4 4k;

    keepalive_timeout            30s; # faster connection recycling
    keepalive_requests           1000;
    send_timeout                 15s;
    client_body_timeout          15s;
    client_header_timeout        15s;

    # ── Open File Cache (caches static file handles) ──────────
    open_file_cache          max=2000 inactive=20s;
    open_file_cache_valid    30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors   on;

    # ── Static Files (served directly by Nginx) ─────────────────────────
    location /static/ {
        alias /var/www/elevateiq/static/;
        expires 1y;         # 1-year cache for fingerprinted assets
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Vary "Accept-Encoding";
        etag on;
        access_log off;
        gzip_static on;
    }

    # ── Proxy to Gunicorn with rate limits ──────────────────
    location / {
        limit_conn conn_limit_per_ip 20; # max 20 simultaneous connections per IP
        limit_req zone=req_limit_per_ip burst=100 nodelay;

        proxy_pass         http://elevateiq_app;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        
        # Optimize connection settings to backend
        proxy_http_version 1.1;
        proxy_set_header   Connection        ""; # enables backend keepalive
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 15s;

        # Enable response buffering (was off — caused extra syscalls and slow TTFB)
        proxy_buffering         on;
        proxy_buffer_size       16k;    # size of first buffer (headers)
        proxy_buffers           8 32k;  # 8 buffers of 32k each
        proxy_busy_buffers_size 64k;    # max to send while reading response
    }

    # ── Gzip Compression ─────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;   # Increased from 5 — better ratio, minimal CPU difference
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml
               application/x-javascript text/javascript image/svg+xml font/woff font/woff2;
    gzip_min_length 256;

    # ── Logs ─────────────────────────────────────────────────
    access_log /var/log/nginx/elevateiq_access.log combined buffer=16k flush=2s;
    error_log  /var/log/nginx/elevateiq_error.log warn;
}
